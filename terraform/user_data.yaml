#cloud-config

package_update: true
package_upgrade: true

packages:
  - docker
  - nginx
  - python3-certbot-nginx
  - amazon-ssm-agent

runcmd:
  # Start SSM agent and enable on reboot
  - systemctl enable amazon-ssm-agent
  - systemctl start amazon-ssm-agent

  # Start Docker and enable on reboot
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker ec2-user

  # Write database URL to env file for docker run --env-file
  - echo "DATABASE_READ_URL=${db_url}" > /home/ec2-user/.env

  # Write nginx config - forward port 80 to Streamlit on 8501, with WebSocket headers
  - |
    cat > /etc/nginx/conf.d/streamlit.conf <<'EOF'
    server {
        listen 80;
        server_name spaceweatherdashboard.com;
        location / {
            proxy_pass http://localhost:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
    EOF

  # Start nginx and enable on reboot
  - systemctl enable nginx
  - systemctl start nginx
