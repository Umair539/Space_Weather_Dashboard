name: Build & Deploy Streamlit App Container

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".streamlit/**"
      - "docker/app/**"
      - "src/utils/logging_utils.py"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN_APP }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_APP }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build --provenance=false --platform linux/arm64 -f docker/app/Dockerfile -t $IMAGE_URI:$SHORT_SHA -t $IMAGE_URI:latest .
          docker push $IMAGE_URI:$SHORT_SHA
          docker push $IMAGE_URI:latest
          echo "image=$IMAGE_URI:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Get EC2 instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=space-weather-app" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSM
        env:
          IMAGE_URI: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY_APP }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}',
              'docker pull $IMAGE_URI:latest',
              'docker stop space-weather-app || true',
              'docker rm space-weather-app || true',
              'docker run -d --name space-weather-app --restart unless-stopped --env-file /home/ec2-user/.env -p 8501:8501 $IMAGE_URI:latest'
            ]" \
            --query "Command.CommandId" \
            --output text)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"