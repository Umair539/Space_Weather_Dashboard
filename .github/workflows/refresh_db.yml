name: Full Database Refresh

on:
  workflow_dispatch:
    inputs:
      upsert_hours:
        description: "Hours of data to upsert"
        required: false
        default: "1000000"
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run ETL with full refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: run_etl --env prod --upsert-hours ${{ inputs.upsert_hours }}
